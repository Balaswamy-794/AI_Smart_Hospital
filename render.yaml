services:
  - type: web
    name: ai-smart-hospital-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT wsgi:app
    autoDeploy: true
    envVars:
      - key: FLASK_DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://ai-smart-hospital-frontend.onrender.com

  - type: web
    name: ai-smart-hospital-appointments
    runtime: node
    rootDir: appointment-service
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGIN
        value: https://ai-smart-hospital-frontend.onrender.com

  - type: static_site
    name: ai-smart-hospital-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_ORIGIN
        value: https://ai-smart-hospital-backend.onrender.com
      - key: REACT_APP_API_URL
        value: https://ai-smart-hospital-backend.onrender.com/api
      - key: REACT_APP_BOOKING_API_ORIGIN
        value: https://ai-smart-hospital-appointments.onrender.com
      - key: REACT_APP_BOOKING_API_URL
        value: https://ai-smart-hospital-appointments.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html